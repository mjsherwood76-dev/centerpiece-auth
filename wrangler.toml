# Cloudflare Workers Configuration for Centerpiece Auth
#
# Deploy with: npm run deploy
# Staging:     npm run deploy:staging

name = "centerpiece-auth"
main = "dist/worker.js"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# D1 Database Binding
# Create with: wrangler d1 create centerpiece-auth-db
# After creation, update the database_id below with the actual ID.
[[d1_databases]]
binding = "AUTH_DB"
database_name = "centerpiece-auth-db"
database_id = "26717b6e-c8a2-430e-83ed-8664192c662e"

# TENANTS_DB — Read-only D1 binding for tenant name/domain lookups
[[d1_databases]]
binding = "TENANTS_DB"
database_name = "centerpiece-tenants-db"
database_id = "de252784-85cb-4192-bb97-ebcfe81f5fda"

# KV Namespace Bindings (read-only — for tenant branding lookups)
[[kv_namespaces]]
binding = "CANONICAL_INPUTS"
id = "fa019b3c5cbd47a296291151def46355"
preview_id = "ff8cb7cba7a14257951a894940c77fea"

[[kv_namespaces]]
binding = "TENANT_CONFIGS"
id = "b8f70a1c8c274821970710fe8df10096"
preview_id = "ee5142299d73451bbf76481b8b4d0c60"

[[services]]
binding = "PLATFORM_API"
service = "centerpiece-platform-api"

# Environment Variables
[vars]
ENVIRONMENT = "production"
AUTH_DOMAIN = "https://auth.centerpiecelab.com"
EMAIL_FROM = "noreply@centerpiecelab.com"
EMAIL_FROM_NAME = "Centerpiece Lab"
ACCESS_TOKEN_TTL_SECONDS = "900"
REFRESH_TOKEN_TTL_DAYS = "30"
AUTH_CODE_TTL_SECONDS = "60"

# Secrets (set via `wrangler secret put`):
#   JWT_PRIVATE_KEY  — ES256 PEM private key, base64-encoded
#   JWT_PUBLIC_KEY   — ES256 PEM public key, base64-encoded
#   INTERNAL_SECRET  — Shared secret for internal service-to-service calls (runtime → auth)
#   GOOGLE_CLIENT_ID
#   GOOGLE_CLIENT_SECRET
#   FACEBOOK_APP_ID
#   FACEBOOK_APP_SECRET
#   APPLE_CLIENT_ID
#   APPLE_CLIENT_SECRET
#   APPLE_KEY_ID
#   APPLE_TEAM_ID
#   APPLE_PRIVATE_KEY — PEM, base64-encoded
#   MICROSOFT_CLIENT_ID
#   MICROSOFT_CLIENT_SECRET
#   SENDGRID_API_KEY — SendGrid API key (Mail Send permission only)

# Build configuration
[build]
command = "npm run build"

# ------------------------------------------------------------------
# Staging Environment
# ------------------------------------------------------------------
[env.staging]
name = "centerpiece-auth-staging"
workers_dev = true
# Override top-level routes so staging does NOT claim auth.centerpiecelab.com
# (production-only route). Staging uses *.workers.dev via workers_dev = true.
routes = []
vars = { ENVIRONMENT = "staging", AUTH_DOMAIN = "https://centerpiece-auth-staging.mjsherwood76.workers.dev", EMAIL_FROM = "noreply@centerpiecelab.com", EMAIL_FROM_NAME = "Centerpiece Lab", ACCESS_TOKEN_TTL_SECONDS = "900", REFRESH_TOKEN_TTL_DAYS = "30", AUTH_CODE_TTL_SECONDS = "60" }

[[env.staging.d1_databases]]
binding = "AUTH_DB"
database_name = "centerpiece-auth-db-staging"
database_id = "4b06dd01-13a0-4fd1-a68f-167a4d73a6a3"

[[env.staging.d1_databases]]
binding = "TENANTS_DB"
database_name = "centerpiece-tenants-db-staging"
database_id = "a13b028d-cc66-4e5f-b13a-b425c6c5ff39"

[[env.staging.kv_namespaces]]
binding = "CANONICAL_INPUTS"
id = "ff8cb7cba7a14257951a894940c77fea"

[[env.staging.kv_namespaces]]
binding = "TENANT_CONFIGS"
id = "ee5142299d73451bbf76481b8b4d0c60"

[[env.staging.services]]
binding = "PLATFORM_API"
service = "centerpiece-platform-api-staging"

# Custom domain route — auth.centerpiecelab.com
# Routes all auth traffic for the platform domain to this Worker.
# Note: A DNS record for auth.centerpiecelab.com must exist (CNAME/A, proxied).
[[routes]]
pattern = "auth.centerpiecelab.com/*"
zone_name = "centerpiecelab.com"
